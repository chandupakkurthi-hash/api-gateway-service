spring.application.name=api-gateway-service
server.port=8080

eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}

management.endpoints.web.exposure.include=health,info

# Rate limiting (in-memory, gateway only)
# Note: for multiple gateway replicas you should switch to Redis or edge rate limiting (WAF/API Gateway).
rate.limit.enabled=true
rate.limit.window-seconds=60
rate.limit.max-requests=120

# Forward original host/proto/port to downstream apps so redirects keep the gateway host/port.
spring.cloud.gateway.server.webmvc.x-forwarded-request-headers-filter.enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded-request-headers-filter.host-enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded-request-headers-filter.port-enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded-request-headers-filter.proto-enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded-request-headers-filter.for-enabled=true

# Routes (Spring Cloud Gateway Server WebMVC)
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].args.pattern=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=property-service-properties
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://property-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[1].predicates[0].args.pattern=/properties/**

spring.cloud.gateway.server.webmvc.routes[2].id=property-service-bookmarks
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://property-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[2].predicates[0].args.pattern=/bookmarks/**

spring.cloud.gateway.server.webmvc.routes[3].id=billing-support-service-api
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://billing-support-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[3].predicates[0].args.pattern=/api/**

spring.cloud.gateway.server.webmvc.routes[4].id=billing-support-service-chatbot
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://billing-support-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[4].predicates[0].args.pattern=/chatbot/**

# Web-UI (catch-all) - keep this last so API routes match first
spring.cloud.gateway.server.webmvc.routes[5].id=web-ui
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://web-ui
spring.cloud.gateway.server.webmvc.routes[5].order=1000
spring.cloud.gateway.server.webmvc.routes[5].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[5].predicates[0].args.pattern=/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0].name=PreserveHost

server.tomcat.remoteip.remote-ip-header=x-forwarded-for

# Redis (Cloud Redis)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
